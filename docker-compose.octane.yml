services:
  app:
    image: dunglas/frankenphp:1-php8.4
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "${OCTANE_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    command: php artisan octane:frankenphp --host=0.0.0.0 --port=8000 --workers=2 --max-requests=250
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://127.0.0.1:8000/up\") === false ? 1 : 0);'"]
      interval: 10s
      timeout: 5s
      retries: 5
